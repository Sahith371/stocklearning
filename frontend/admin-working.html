<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupon Management Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            color: #333;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-header {
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-user {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            color: #666;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
            padding: 20px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .stat-card {
            text-align: center;
        }

        .stat-card h3 {
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .stat-card span {
            font-size: 2rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .management-section {
            padding: 0;
            margin-bottom: 40px;
        }

        .section-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .actions-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .btn {
            padding: 10px 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            background: #fff;
            color: #333;
        }

        .btn:hover {
            background: #f5f5f5;
        }

        .btn-primary {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        .btn-primary:hover {
            background: #333;
        }

        .btn-secondary {
            background: #fff;
            color: #333;
            border: 1px solid #ccc;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
        }

        .btn-danger {
            background: #dc3545;
            color: #fff;
            border-color: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .search-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .search-input, .filter-select {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            background: #fff;
        }

        .search-input:focus, .filter-select:focus {
            outline: none;
            border-color: #1a1a1a;
        }

        .coupon-table {
            overflow-x: auto;
            border: 1px solid #e0e0e0;
        }

        th {
            background: #1a1a1a;
            color: white;
            padding: 12px 15px;
            text-align: left;
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            font-size: 0.95rem;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .status-active {
            background: #d4edda;
            color: #155724;
        }

        .status-used {
            background: #f8d7da;
            color: #721c24;
        }

        .status-expired {
            background: #fff3cd;
            color: #856404;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 3px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border: 1px solid #ddd;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .modal-header h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            color: #666;
        }

        .close-modal:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            font-size: 0.9rem;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #1a1a1a;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading i {
            font-size: 2rem;
            margin-bottom: 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 18px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-success {
            background: #28a745;
        }

        .toast-error {
            background: #dc3545;
        }

        .toast-info {
            background: #17a2b8;
        }

        @media (max-width: 768px) {
            .admin-container {
                padding: 10px;
            }

            .admin-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .admin-header h1 {
                font-size: 2rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .actions-bar, .search-filters {
                flex-direction: column;
            }

            .coupon-table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 10px;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>
                <i class="fas fa-ticket-alt"></i>
                Coupon Management
            </h1>
            <div class="admin-user">
                <i class="fas fa-user-shield"></i>
                Welcome, Admin
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <h3>Total Generated</h3>
                <span id="totalGenerated">0</span>
            </div>
            <div class="stat-card">
                <h3>Active Coupons</h3>
                <span id="activeCoupons">0</span>
            </div>
            <div class="stat-card">
                <h3>Used Coupons</h3>
                <span id="usedCoupons">0</span>
            </div>
            <div class="stat-card">
                <h3>Total Discounts</h3>
                <span id="totalDiscounts">₹0</span>
            </div>
        </section>

        <section class="management-section">
            <div class="section-header">
                <h2>Coupon Management</h2>
            </div>

            <div class="actions-bar">
                <button class="btn btn-primary" onclick="openBulkGenerateModal()">
                    <i class="fas fa-plus-circle"></i>
                    Generate Bulk Coupons
                </button>
                <button class="btn btn-secondary" onclick="generateSingleCoupon()">
                    <i class="fas fa-ticket-alt"></i>
                    Generate Single Coupon
                </button>
                <button class="btn btn-secondary" onclick="exportCoupons()">
                    <i class="fas fa-download"></i>
                    Export CSV
                </button>
                <button class="btn btn-danger" onclick="cleanUsedCoupons()">
                    <i class="fas fa-trash"></i>
                    Clean Used
                </button>
            </div>

            <div class="search-filters">
                <input type="text" id="searchInput" class="search-input" placeholder="Search coupons...">
                <select id="statusFilter" class="filter-select">
                    <option value="">All Status</option>
                    <option value="active">Active</option>
                    <option value="used">Used</option>
                    <option value="expired">Expired</option>
                </select>
                <select id="scoreFilter" class="filter-select">
                    <option value="">All Scores</option>
                    <option value="90">90%+</option>
                    <option value="80">80%+</option>
                    <option value="70">70%+</option>
                </select>
                <button class="btn btn-secondary" onclick="applyFilters()">
                    <i class="fas fa-filter"></i>
                    Apply Filters
                </button>
            </div>

            <div class="coupon-table">
                <table>
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>User</th>
                            <th>Score</th>
                            <th>Discount</th>
                            <th>Status</th>
                            <th>Generated</th>
                            <th>Expires</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="couponsTableBody">
                        <tr>
                            <td colspan="8" class="loading">
                                <i class="fas fa-spinner"></i>
                                <div>Loading coupons...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Bulk Generate Modal -->
    <div id="bulkGenerateModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Generate Bulk Coupons</h3>
                <button class="close-modal" onclick="closeModal('bulkGenerateModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="bulkGenerateForm">
                <div class="form-group">
                    <label for="bulkCount">Number of Coupons</label>
                    <input type="number" id="bulkCount" min="1" max="100" value="10" required>
                </div>
                <div class="form-group">
                    <label for="bulkDiscount">Discount Percentage</label>
                    <input type="number" id="bulkDiscount" min="1" max="100" value="30" required>
                </div>
                <div class="form-group">
                    <label for="bulkExpiry">Expiry Days</label>
                    <input type="number" id="bulkExpiry" min="1" max="365" value="7" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('bulkGenerateModal')">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus-circle"></i>
                        Generate Coupons
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Single Generate Modal -->
    <div id="singleGenerateModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Generate Single Coupon</h3>
                <button class="close-modal" onclick="closeModal('singleGenerateModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="singleGenerateForm">
                <div class="form-group">
                    <label for="singleCode">Coupon Code (Optional)</label>
                    <input type="text" id="singleCode" placeholder="Leave empty for auto-generation">
                </div>
                <div class="form-group">
                    <label for="singleDiscount">Discount Percentage</label>
                    <input type="number" id="singleDiscount" min="1" max="100" value="30" required>
                </div>
                <div class="form-group">
                    <label for="singleExpiry">Expiry Days</label>
                    <input type="number" id="singleExpiry" min="1" max="365" value="7" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('singleGenerateModal')">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-ticket-alt"></i>
                        Generate Coupon
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- View Coupon Modal -->
    <div id="viewCouponModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Coupon Details</h3>
                <button class="close-modal" onclick="closeModal('viewCouponModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="couponDetails">
                <!-- Coupon details will be loaded here -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('viewCouponModal')">
                    Close
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script>
        // Global variables
        let currentCoupons = [];
        let currentPage = 1;
        let filters = {
            search: '',
            status: '',
            score: ''
        };

        // Initialize the admin panel
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadCoupons();
            
            // Add event listeners
            document.getElementById('bulkGenerateForm').addEventListener('submit', handleBulkGenerate);
            document.getElementById('singleGenerateForm').addEventListener('submit', handleSingleGenerate);
            document.getElementById('searchInput').addEventListener('input', debounce(handleSearch, 300));
            document.getElementById('statusFilter').addEventListener('change', handleFilterChange);
            document.getElementById('scoreFilter').addEventListener('change', handleFilterChange);
        });

        // Load statistics
        async function loadStats() {
            try {
                console.log('Loading stats from API...');
                console.log('Current URL:', window.location.origin);
                
                const response = await fetch(`${window.location.origin}/api/admin/coupons/stats`);
                console.log('Stats response status:', response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Error response:', errorText);
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const stats = await response.json();
                console.log('Stats data:', stats);
                
                document.getElementById('totalGenerated').textContent = stats.totalGenerated || 0;
                document.getElementById('activeCoupons').textContent = stats.activeCoupons || 0;
                document.getElementById('usedCoupons').textContent = stats.usedCoupons || 0;
                document.getElementById('totalDiscounts').textContent = '₹' + (stats.totalDiscounts || 0);
            } catch (error) {
                console.error('Error loading stats:', error);
                showToast('Error loading statistics: ' + error.message, 'error');
                
                // Set default values
                document.getElementById('totalGenerated').textContent = '0';
                document.getElementById('activeCoupons').textContent = '0';
                document.getElementById('usedCoupons').textContent = '0';
                document.getElementById('totalDiscounts').textContent = '₹0';
            }
        }

        // Load coupons
        async function loadCoupons() {
            try {
                showLoading();
                console.log('Loading coupons from API...');
                console.log('Current URL:', window.location.origin);
                
                const queryParams = new URLSearchParams({
                    page: currentPage,
                    search: filters.search,
                    status: filters.status,
                    score: filters.score
                });
                
                console.log('API request params:', queryParams.toString());
                
                const response = await fetch(`${window.location.origin}/api/admin/coupons?${queryParams}`);
                console.log('Coupons response status:', response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Error response:', errorText);
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const coupons = await response.json();
                console.log('Coupons data:', coupons);
                
                currentCoupons = coupons;
                renderCouponsTable(coupons);
            } catch (error) {
                console.error('Error loading coupons:', error);
                showToast('Error loading coupons: ' + error.message, 'error');
                renderCouponsTable([]);
            }
        }

        // Render coupons table
        function renderCouponsTable(coupons) {
            const tbody = document.getElementById('couponsTableBody');
            
            if (!coupons || coupons.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align: center; padding: 40px; color: #666;">
                            <i class="fas fa-inbox" style="font-size: 2rem; margin-bottom: 10px; display: block;"></i>
                            No coupons found
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = coupons.map(coupon => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <strong>${coupon.code}</strong>
                            <button class="btn btn-sm btn-secondary" onclick="copyCouponCode('${coupon.code}')" title="Copy coupon code">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </td>
                    <td>${coupon.username || coupon.userId || 'N/A'}</td>
                    <td>${coupon.userId === 'admin-generated' ? '-' : (coupon.score || 'N/A')}%</td>
                    <td>${coupon.discount}%</td>
                    <td>${getStatusBadge(coupon)}</td>
                    <td>${formatDate(coupon.generatedAt)}</td>
                    <td>${formatDate(coupon.expiresAt)}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm btn-secondary" onclick="viewCoupon('${coupon._id}')">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteCoupon('${coupon._id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Get status badge HTML
        function getStatusBadge(coupon) {
            const now = new Date();
            const expiresAt = new Date(coupon.expiresAt);
            
            if (coupon.used) {
                return '<span class="status-badge status-used">Used</span>';
            } else if (now > expiresAt) {
                return '<span class="status-badge status-expired">Expired</span>';
            } else {
                return '<span class="status-badge status-active">Active</span>';
            }
        }

        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Show loading state
        function showLoading() {
            const tbody = document.getElementById('couponsTableBody');
            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="loading">
                        <i class="fas fa-spinner"></i>
                        <div>Loading coupons...</div>
                    </td>
                </tr>
            `;
        }

        // Modal functions
        function openBulkGenerateModal() {
            document.getElementById('bulkGenerateModal').style.display = 'flex';
        }

        function generateSingleCoupon() {
            document.getElementById('singleGenerateModal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Handle bulk generate
        async function handleBulkGenerate(e) {
            e.preventDefault();
            
            const count = parseInt(document.getElementById('bulkCount').value);
            const discount = parseInt(document.getElementById('bulkDiscount').value);
            const expiryDays = parseInt(document.getElementById('bulkExpiry').value);
            
            try {
                const response = await fetch('/api/admin/coupons/generate-bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count, discount, expiryDays })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showToast(`Successfully generated ${result.generated} coupons!`, 'success');
                    closeModal('bulkGenerateModal');
                    loadStats();
                    loadCoupons();
                } else {
                    console.error('Server error:', result);
                    showToast(result.error || 'Error generating coupons', 'error');
                }
            } catch (error) {
                console.error('Error generating bulk coupons:', error);
                showToast('Network error: ' + error.message, 'error');
            }
        }

        // Handle single generate
        async function handleSingleGenerate(e) {
            e.preventDefault();
            
            const code = document.getElementById('singleCode').value.trim();
            const discount = parseInt(document.getElementById('singleDiscount').value);
            const expiryDays = parseInt(document.getElementById('singleExpiry').value);
            
            try {
                const response = await fetch('/api/admin/coupons/generate-single', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, discount, expiryDays })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showToast(`Successfully generated coupon: ${result.coupon.code}`, 'success');
                    closeModal('singleGenerateModal');
                    loadStats();
                    loadCoupons();
                } else {
                    console.error('Server error:', result);
                    showToast(result.error || 'Error generating coupon', 'error');
                }
            } catch (error) {
                console.error('Error generating single coupon:', error);
                showToast('Network error: ' + error.message, 'error');
            }
        }

        // View coupon details
        async function viewCoupon(couponId) {
            try {
                const coupon = currentCoupons.find(c => c._id === couponId);
                if (!coupon) {
                    showToast('Coupon not found', 'error');
                    return;
                }
                
                const detailsHtml = `
                    <div style="display: grid; gap: 15px;">
                        <div><strong>Coupon Code:</strong> ${coupon.code}</div>
                        <div><strong>User ID:</strong> ${coupon.userId || 'N/A'}</div>
                        <div><strong>Username:</strong> ${coupon.username || 'N/A'}</div>
                        <div><strong>Score:</strong> ${coupon.userId === 'admin-generated' ? '-' : (coupon.score || 'N/A')}%</div>
                        <div><strong>Discount:</strong> ${coupon.discount}%</div>
                        <div><strong>Status:</strong> ${getStatusBadge(coupon)}</div>
                        <div><strong>Generated At:</strong> ${formatDate(coupon.generatedAt)}</div>
                        <div><strong>Expires At:</strong> ${formatDate(coupon.expiresAt)}</div>
                        ${coupon.usedAt ? `<div><strong>Used At:</strong> ${formatDate(coupon.usedAt)}</div>` : ''}
                    </div>
                `;
                
                document.getElementById('couponDetails').innerHTML = detailsHtml;
                document.getElementById('viewCouponModal').style.display = 'flex';
            } catch (error) {
                console.error('Error viewing coupon:', error);
                showToast('Error viewing coupon', 'error');
            }
        }

        // Delete coupon
        async function deleteCoupon(couponId) {
            if (!confirm('Are you sure you want to delete this coupon? This action cannot be undone.')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/admin/coupons/${couponId}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showToast('Coupon deleted successfully', 'success');
                    loadStats();
                    loadCoupons();
                } else {
                    showToast(result.error || 'Error deleting coupon', 'error');
                }
            } catch (error) {
                console.error('Error deleting coupon:', error);
                showToast('Error deleting coupon', 'error');
            }
        }

        // Export coupons
        async function exportCoupons() {
            try {
                const response = await fetch('/api/admin/coupons/export');
                const blob = await response.blob();
                
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `coupons_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                
                showToast('Coupons exported successfully', 'success');
            } catch (error) {
                console.error('Error exporting coupons:', error);
                showToast('Error exporting coupons', 'error');
            }
        }

        // Clean used coupons
        async function cleanUsedCoupons() {
            if (!confirm('Are you sure you want to delete all used coupons? This action cannot be undone.')) {
                return;
            }
            
            try {
                const response = await fetch('/api/admin/coupons/clean-used', {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showToast(`Successfully deleted ${result.deleted} used coupons`, 'success');
                    loadStats();
                    loadCoupons();
                } else {
                    showToast(result.error || 'Error cleaning used coupons', 'error');
                }
            } catch (error) {
                console.error('Error cleaning used coupons:', error);
                showToast('Error cleaning used coupons', 'error');
            }
        }

        // Copy coupon code to clipboard
        async function copyCouponCode(couponCode) {
            try {
                await navigator.clipboard.writeText(couponCode);
                showToast(`Coupon code ${couponCode} copied to clipboard!`, 'success');
            } catch (error) {
                console.error('Error copying coupon code:', error);
                
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = couponCode;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                showToast(`Coupon code ${couponCode} copied to clipboard!`, 'success');
            }
        }

        // Filter functions
        function handleSearch(e) {
            filters.search = e.target.value;
            loadCoupons();
        }

        function handleFilterChange() {
            filters.status = document.getElementById('statusFilter').value;
            filters.score = document.getElementById('scoreFilter').value;
            loadCoupons();
        }

        function applyFilters() {
            loadCoupons();
        }

        // Toast notification
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                ${message}
            `;
            
            document.getElementById('toastContainer').appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Debounce function
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Close modals when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
